services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-gemma
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=https://gemma.hostred.cl,http://localhost,https://localhost
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=true
      - OLLAMA_KEEP_ALIVE=5m
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 30; ollama pull gemma4:e2b; wait"]
    deploy:
      resources:
        limits:
          cpus: '5.00'
        reservations:
          cpus: '2.00'
          memory: 2G

volumes:
  ollama-data:
