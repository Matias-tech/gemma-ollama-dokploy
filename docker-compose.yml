version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-gemma
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=https://gemma.hostred.cl,http://localhost,https://localhost
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    command: >
      sh -c "
        ollama serve &
        sleep 10;
        ollama pull gemma4:e2b;
        fg
      "
    deploy:
      resources:
        limits:
          cpus: '4.00'
          memory: 3G
        reservations:
          cpus: '1.00'
          memory: 1G

volumes:
  ollama-data:
